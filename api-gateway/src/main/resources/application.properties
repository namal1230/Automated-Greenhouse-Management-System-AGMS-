spring.application.name=api-gateway
server.port=8765

spring.cloud.gateway.discovery.locator.lower-case-service-id=true

spring.cloud.gateway.discovery.locator.enabled=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
logging.level.org.springframework.cloud.gateway.handler.RoutePredicateHandlerMapping=debug

spring.cloud.gateway.routes[0].id=automation-and-control-service
spring.cloud.gateway.routes[0].uri=lb://automation-and-control-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/automation/**

spring.cloud.gateway.routes[1].id=sensor-telemetry-service
spring.cloud.gateway.routes[1].uri=lb://sensor-telemetry-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/sensors/**

spring.cloud.gateway.routes[2].id=zone-management-service
spring.cloud.gateway.routes[2].uri=lb://zone-management-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/zones/**