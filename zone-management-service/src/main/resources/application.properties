spring.application.name=zone-management-service
spring.config.import=optional:configserver:http://localhost:8888

spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

management.endpoints.web.exposure.include=*

management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans

management.health.circuitbreakers.enabled=true
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always

resilience4j.circuitbreaker.instances.zone-management-service.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.zone-management-service.failureRateThreshold=50
resilience4j.circuitbreaker.instances.zone-management-service.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.zone-management-service.automaticTransitionFromOpenToHalfOpenEnabled=true
resilience4j.circuitbreaker.instances.zone-management-service.waitDurationInOpenState=5s
resilience4j.circuitbreaker.instances.zone-management-service.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.zone-management-service.slidingWindowSize=10
resilience4j.circuitbreaker.instances.zone-management-service.sliding-window-type=count_based

resilience4j.retry.instances.zone-management-service.registerHealthIndicator=true
resilience4j.retry.instances.zone-management-service.maxRetryAttempts=5
resilience4j.retry.instances.zone-management-service.waitDuration=2s